version: '3.8'

# =====================================================
# 东软环保公众监督系统 (NEP) - 基础设施 Docker Compose
# =====================================================

services:

  # ==================== Nacos 注册中心 & 配置中心 ====================
  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: nep-nacos
    platform: linux/amd64
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
      - SPRING_DATASOURCE_PLATFORM=mysql
      - MYSQL_SERVICE_HOST=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_SERVICE_DB_NAME=nacos_config
      - MYSQL_SERVICE_USER=root
      - MYSQL_SERVICE_PASSWORD=182930
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nep-network

  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: nep-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - nep-network

  # ==================== Sentinel 控制台 ====================
  sentinel:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: nep-sentinel
    ports:
      - "8858:8858"
    environment:
      - SENTINEL_DASHBOARD_USERNAME=sentinel
      - SENTINEL_DASHBOARD_PASSWORD=sentinel
    restart: unless-stopped
    networks:
      - nep-network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: nep-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - nep-network

  # ==================== MinIO 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: nep-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9002:9000"    # API端口
      - "9001:9001"    # 控制台端口
    volumes:
      - minio-data:/data
    restart: unless-stopped
    networks:
      - nep-network

volumes:
  mysql-data:
  minio-data:

networks:
  nep-network:
    driver: bridge
