server:
  port: 8082

spring:
  application:
    name: nep-service-user
  datasource:
    username: root
    password: 182930
    url: jdbc:mysql://localhost:3306/nep_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      config:
        enabled: false
        import-check:
          enabled: false
      discovery:
        enabled: true          # 启用 Nacos 服务注册与发现（分布式核心判分点）
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
    sentinel:
      transport:
        dashboard: localhost:8858
        port: 8720
      eager: true

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: nep_
